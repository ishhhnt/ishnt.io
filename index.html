<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ISHNT Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --google-blue: #1a73e8; --bg-white: #ffffff; --text-main: #202124; --text-sub: #5f6368; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Roboto', sans-serif; background: var(--bg-white); color: var(--text-main); padding-bottom: 80px; }
        
        header { position: sticky; top: 0; background: white; z-index: 100; padding: 10px 15px; border-bottom: 1px solid #eee; }
        .brand { font-size: 1.4rem; font-weight: 700; color: var(--google-blue); margin-bottom: 10px; }
        .search-bar { background: #f1f3f4; height: 45px; border-radius: 8px; display: flex; align-items: center; padding: 0 15px; color: var(--text-sub); }

        .section-title { padding: 20px 15px 10px; font-size: 1.1rem; font-weight: 700; display: flex; align-items: center; justify-content: space-between; }
        .section-divider { border-top: 8px solid #f1f3f4; margin-top: 20px; }

        .store-grid { display: grid; gap: 15px; padding: 15px; grid-template-columns: repeat(4, 1fr); }
        .app-card { cursor: pointer; text-align: center; }
        .app-icon { width: 100%; aspect-ratio: 1/1; border-radius: 22%; object-fit: cover; border: 1px solid #eee; }
        .app-name { font-size: 0.8rem; font-weight: 500; margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Detail Overlay */
        #detail-page { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; overflow-y: auto; padding: 20px; }
        .back-btn { font-size: 1.5rem; cursor: pointer; margin-bottom: 20px; display: inline-block; }
        .play-now-btn { display: block; width: 100%; background: var(--google-blue); color: white; text-align: center; padding: 15px; border-radius: 8px; text-decoration: none; font-weight: 700; margin-top: 30px; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 65px; background: white; border-top: 1px solid #dadce0; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { text-align: center; color: var(--text-sub); font-size: 0.7rem; cursor: pointer; flex: 1; }
        .nav-item.active { color: var(--google-blue); font-weight: bold; }
        .nav-item span { font-size: 1.4rem; display: block; margin-bottom: 2px; }

        @media (max-width: 600px) { .store-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>

    <header>
        <div class="brand">ISHNT.IO</div>
        <div class="search-bar">🔍 Search apps & games</div>
    </header>

    <div id="main-content">
        
        <div id="games-group">
            <div class="section-title">Recommended Games <span style="color:var(--google-blue); font-size:0.8rem;">More</span></div>
            <div class="store-grid">
                <div class="app-card" onclick="showDetails('Opcar V2', 'image/1.png', 'https://ishhhnt.github.io/Opcar-version--2/', 'Racing')">
                    <img src="image/1.png" class="app-icon">
                    <div class="app-name">Opcar V2</div>
                </div>
                <div class="app-card" onclick="showDetails('Openworld Car', 'image/2.png', 'https://ishhhnt.github.io/Openword-car-/', 'Racing')">
                    <img src="image/2.png" class="app-icon">
                    <div class="app-name">Openworld</div>
                </div>
                <div class="app-card" onclick="showDetails('Warship', 'image/3.png', 'https://ishhhnt.github.io/Warship/', 'Strategy')">
                    <img src="image/3.png" class="app-icon">
                    <div class="app-name">Warship</div>
                </div>
                <div class="app-card" onclick="showDetails('Highway Run', 'image/4.png', 'https://ishhhnt.github.io/highway-run/', 'Racing')">
                    <img src="image/4.png" class="app-icon">
                    <div class="app-name">Highway Run</div>
                </div>
            </div>
        </div>

        <div class="section-divider" id="app-divider"></div>

        <div id="apps-group">
            <div class="section-title">Top Rated Apps <span style="color:var(--google-blue); font-size:0.8rem;">More</span></div>
            <div class="store-grid">
                <div class="app-card" onclick="showDetails('Ishnt Chat', 'image/5.png', 'https://ishhhnt.github.io/Ishnttchattingweb/', 'Social')">
                    <img src="image/5.png" class="app-icon">
                    <div class="app-name">Ishnt Chat</div>
                </div>
                <div class="app-card" onclick="alert('More Apps Coming Soon!')">
                    <div class="app-icon" style="background:#f8f9fa; display:flex; align-items:center; justify-content:center; color:#bdc1c6; border:1.5px dashed #dadce0;">+</div>
                    <div class="app-name">More</div>
                </div>
            </div>
        </div>

    </div>

    <div id="detail-page">
        <span class="back-btn" onclick="hideDetails()">←</span>
        <div style="display:flex; gap:20px; align-items:center;">
            <img src="" id="det-img" style="width:80px; height:80px; border-radius:20%;">
            <div>
                <h2 id="det-title"></h2>
                <p id="det-type" style="color:var(--google-blue); font-size:0.9rem; font-weight:500;"></p>
                <p style="font-size:0.75rem; color:var(--text-sub);">Official ISHNT Web Game/App</p>
            </div>
        </div>
        <a href="" id="det-link" class="play-now-btn">PLAY / OPEN NOW</a>
    </div>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="showSection('home', this)"><span>🏠</span>Home</div>
        <div class="nav-item" onclick="showSection('games', this)"><span>🎮</span>Games</div>
        <div class="nav-item" onclick="showSection('apps', this)"><span>📱</span>Apps</div>
    </nav>

    <script>
        function showSection(type, btn) {
            // Update UI Active State
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            btn.classList.add('active');

            const games = document.getElementById('games-group');
            const apps = document.getElementById('apps-group');
            const divider = document.getElementById('app-divider');

            if (type === 'home') {
                games.style.display = 'block';
                apps.style.display = 'block';
                divider.style.display = 'block';
            } else if (type === 'games') {
                games.style.display = 'block';
                apps.style.display = 'none';
                divider.style.display = 'none';
            } else {
                games.style.display = 'none';
                apps.style.display = 'block';
                divider.style.display = 'none';
            }
            window.scrollTo(0, 0);
        }

        function showDetails(title, img, link, type) {
            document.getElementById('det-title').innerText = title;
            document.getElementById('det-img').src = img;
            document.getElementById('det-link').href = link;
            document.getElementById('det-type').innerText = type;
            document.getElementById('detail-page').style.display = 'block';
        }

        function hideDetails() { document.getElementById('detail-page').style.display = 'none'; }
    </script>
</body>
</html>
